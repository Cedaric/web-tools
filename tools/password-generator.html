<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strong Password Generator - Web Tools</title>
    <meta name="description" content="Generate secure, strong passwords instantly with custom parameters.">
    <meta name="tool-icon" content="ri-shield-keyhole-line">
    <meta name="tool-tags" content="Password, Security, Generator">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --surface-color: #ffffff;
            --border-color: #e2e8f0;
            --primary-color: #10b981;
            --primary-hover: #059669;
            --text-muted: #64748b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --text-color: #e2e8f0;
                --surface-color: #1e293b;
                --border-color: #334155;
                --primary-color: #34d399;
                --primary-hover: #10b981;
                --text-muted: #94a3b8;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: var(--surface-color);
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header a {
            color: var(--text-muted);
            text-decoration: none;
        }

        .header a:hover {
            color: var(--text-color);
        }

        .container {
            flex: 1;
            max-width: 600px;
            margin: 0 auto;
            padding: 3rem 2rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .pwd-display {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .pwd-text {
            font-family: ui-monospace, SFMono-Regular, monospace;
            font-size: 1.5rem;
            font-weight: 600;
            word-break: break-all;
            letter-spacing: 1px;
            color: var(--text-color);
        }

        .copy-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: var(--primary-hover);
        }

        .panel {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .range-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .range-header {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary-color);
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
        }

        .option-item:last-child {
            border-bottom: none;
        }

        .option-label {
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--border-color);
            transition: .4s;
            border-radius: 24px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary-color);
        }

        input:checked+.slider:before {
            transform: translateX(20px);
        }

        .strength-meter {
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            margin-top: -1rem;
            overflow: hidden;
            display: flex;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }

        .btn-generate {
            background: var(--text-color);
            color: var(--bg-color);
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            transition: opacity 0.2s;
        }

        .btn-generate:hover {
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <header class="header">
        <a href="../index.html" title="Back to Tools"><i class="ri-arrow-left-line ri-xl"></i></a>
        <h1><i class="ri-shield-keyhole-line text-primary"></i> Password Generator</h1>
    </header>

    <main class="container">
        <div class="pwd-display">
            <span class="pwd-text" id="pwdResult">Generating...</span>
            <button class="copy-btn" onclick="copyPwd()">
                <i class="ri-clipboard-line"></i> Copy
            </button>
        </div>

        <div class="strength-meter">
            <div class="strength-fill" id="strengthFill"></div>
        </div>

        <div class="panel">
            <div class="range-group">
                <div class="range-header">
                    <span>Password Length</span>
                    <span id="lengthValue" style="color: var(--primary-color);">16</span>
                </div>
                <input type="range" id="lengthSlider" min="6" max="64" value="16" oninput="updateLength()">
            </div>

            <div class="options-group">
                <div class="option-item">
                    <span class="option-label">Uppercase (A-Z)</span>
                    <label class="switch">
                        <input type="checkbox" id="chkUpper" checked onchange="generatePassword()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="option-item">
                    <span class="option-label">Lowercase (a-z)</span>
                    <label class="switch">
                        <input type="checkbox" id="chkLower" checked onchange="generatePassword()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="option-item">
                    <span class="option-label">Numbers (0-9)</span>
                    <label class="switch">
                        <input type="checkbox" id="chkNum" checked onchange="generatePassword()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="option-item">
                    <span class="option-label">Symbols (!@#$...)</span>
                    <label class="switch">
                        <input type="checkbox" id="chkSym" checked onchange="generatePassword()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <button class="btn-generate" onclick="generatePassword()">
                <i class="ri-refresh-line"></i> Generate
            </button>
        </div>
    </main>

    <script>
        const DOM = {
            result: document.getElementById('pwdResult'),
            slider: document.getElementById('lengthSlider'),
            val: document.getElementById('lengthValue'),
            up: document.getElementById('chkUpper'),
            low: document.getElementById('chkLower'),
            num: document.getElementById('chkNum'),
            sym: document.getElementById('chkSym'),
            meter: document.getElementById('strengthFill')
        };

        const CHARS = {
            up: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            low: 'abcdefghijklmnopqrstuvwxyz',
            num: '0123456789',
            sym: '!@#$%^&*()_+~`|}{[]:;?><,./-='
        };

        function updateLength() {
            DOM.val.textContent = DOM.slider.value;
            generatePassword();
        }

        function calculateStrength(pwd) {
            let score = 0;
            if (pwd.length > 8) score += 1;
            if (pwd.length > 12) score += 1;
            if (pwd.length >= 16) score += 1;
            if (/[A-Z]/.test(pwd)) score += 1;
            if (/[0-9]/.test(pwd)) score += 1;
            if (/[^A-Za-z0-9]/.test(pwd)) score += 1;

            if (score <= 2) { DOM.meter.style.width = '33%'; DOM.meter.style.background = '#ef4444'; }
            else if (score <= 4) { DOM.meter.style.width = '66%'; DOM.meter.style.background = '#f59e0b'; }
            else { DOM.meter.style.width = '100%'; DOM.meter.style.background = '#10b981'; }
        }

        function generatePassword() {
            let charset = '';
            if (DOM.up.checked) charset += CHARS.up;
            if (DOM.low.checked) charset += CHARS.low;
            if (DOM.num.checked) charset += CHARS.num;
            if (DOM.sym.checked) charset += CHARS.sym;

            if (!charset) {
                DOM.low.checked = true;
                charset += CHARS.low;
            }

            let pwd = '';
            const length = DOM.slider.value;
            const values = new Uint32Array(length);
            window.crypto.getRandomValues(values);

            for (let i = 0; i < length; i++) {
                pwd += charset[values[i] % charset.length];
            }

            DOM.result.textContent = pwd;
            calculateStrength(pwd);
        }

        async function copyPwd() {
            const val = DOM.result.textContent;
            try {
                await navigator.clipboard.writeText(val);
                alert("Password copied to clipboard");
            } catch (e) { }
        }

        // Init
        generatePassword();
    </script>
</body>

</html>
