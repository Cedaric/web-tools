<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Keycode Info - Web Tools</title>
    <meta name="description" content="Press any key to get the JavaScript event keycode, code, and other properties.">
    <meta name="tool-icon" content="ri-keyboard-line">
    <meta name="tool-tags" content="Keycode, Javascript, Events, Keyboard">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --surface-color: #ffffff;
            --border-color: #e2e8f0;
            --primary-color: #f59e0b;
            --text-muted: #64748b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --text-color: #e2e8f0;
                --surface-color: #1e293b;
                --border-color: #334155;
                --primary-color: #fbbf24;
                --text-muted: #94a3b8;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* prevent scroll when pressing space, etc */
        }

        .header {
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .header a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 1.5rem;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            position: relative;
        }

        .press-hero {
            position: absolute;
            font-size: 2rem;
            font-weight: 600;
            color: var(--text-muted);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
                transform: scale(0.95);
            }

            50% {
                opacity: 1;
                transform: scale(1);
            }

            100% {
                opacity: 0.6;
                transform: scale(0.95);
            }
        }

        .info-panel {
            display: none;
            /* hidden initially */
            width: 100%;
            max-width: 800px;
            animation: popIn 0.3s ease-out forwards;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-key {
            font-size: 8rem;
            font-weight: 700;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 2rem;
            line-height: 1;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .card-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .card-value {
            font-size: 1.5rem;
            font-weight: 600;
            font-family: ui-monospace, monospace;
        }
    </style>
</head>

<body>
    <header class="header">
        <a href="../index.html" title="Back to Tools"><i class="ri-arrow-left-line"></i></a>
        <div style="font-weight: 600; color: var(--text-muted);">Event Keycode</div>
    </header>

    <main class="container">
        <div class="press-hero" id="promptTxt">Press any key</div>

        <div class="info-panel" id="infoPanel">
            <div class="main-key" id="mainKey">e.key</div>

            <div class="grid">
                <div class="card">
                    <div class="card-label">event.key</div>
                    <div class="card-value" id="valKey">-</div>
                </div>
                <div class="card">
                    <div class="card-label">event.code</div>
                    <div class="card-value" id="valCode">-</div>
                </div>
                <div class="card">
                    <div class="card-label">event.keyCode (Deprecated)</div>
                    <div class="card-value" id="valKeyCode">-</div>
                </div>
                <div class="card">
                    <div class="card-label">Modifiers</div>
                    <div class="card-value" id="valModifiers">-</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const promptTxt = document.getElementById('promptTxt');
        const infoPanel = document.getElementById('infoPanel');

        const views = {
            main: document.getElementById('mainKey'),
            key: document.getElementById('valKey'),
            code: document.getElementById('valCode'),
            keyCode: document.getElementById('valKeyCode'),
            modifiers: document.getElementById('valModifiers')
        };

        window.addEventListener('keydown', (e) => {
            e.preventDefault(); // stop scrolling when spacebar hit

            promptTxt.style.display = 'none';
            infoPanel.style.display = 'block';

            // Retrigger animation
            infoPanel.style.animation = 'none';
            infoPanel.offsetHeight; /* trigger reflow */
            infoPanel.style.animation = 'popIn 0.2s ease-out forwards';

            let mainTxt = e.key;
            if (mainTxt === ' ') mainTxt = 'Space';

            views.main.textContent = mainTxt;
            views.key.textContent = mainTxt;
            views.code.textContent = e.code;
            views.keyCode.textContent = e.keyCode;

            let mods = [];
            if (e.ctrlKey) mods.push('Ctrl');
            if (e.shiftKey) mods.push('Shift');
            if (e.altKey) mods.push('Alt');
            if (e.metaKey) mods.push('Meta');

            views.modifiers.textContent = mods.length > 0 ? mods.join(' + ') : 'None';

        }, { passive: false });
    </script>
</body>

</html>
