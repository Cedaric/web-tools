<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Shadow Generator - Web Tools</title>
    <meta name="description" content="Generate and preview CSS box shadows visually.">
    <meta name="tool-icon" content="ri-shape-2-line">
    <meta name="tool-tags" content="CSS, Shadow, Design, Generator">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --surface-color: #ffffff;
            --border-color: #e2e8f0;
            --primary-color: #6366f1;
            --text-muted: #64748b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --text-color: #e2e8f0;
                --surface-color: #1e293b;
                --border-color: #334155;
                --text-muted: #94a3b8;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 1.5rem 2rem;
            background: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header a {
            color: var(--text-muted);
            text-decoration: none;
        }

        .header a:hover {
            color: var(--text-color);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .container {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary-color);
        }

        input[type="color"] {
            width: 100%;
            height: 40px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            padding: 2px;
            background: var(--surface-color);
        }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
            color: var(--text-color);
            cursor: pointer;
        }

        /* Right side */
        .preview-area {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .canvas {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f1f5f9;
            min-height: 400px;
            background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
            background-size: 20px 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .box {
            width: 250px;
            height: 250px;
            background-color: #ffffff;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #94a3b8;
            transition: box-shadow 0.1s;
            /* smooth dragging */
        }

        .code-container {
            padding: 1.5rem;
            background: var(--surface-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .code-box {
            font-family: ui-monospace, monospace;
            font-size: 1.1rem;
            color: var(--text-color);
            background: rgba(0, 0, 0, 0.03);
            padding: 1rem;
            border-radius: 8px;
            flex: 1;
            margin-right: 1rem;
            word-break: break-all;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
</head>

<body>
    <header class="header">
        <a href="../index.html" title="Back to Tools"><i class="ri-arrow-left-line ri-xl"></i></a>
        <h1><i class="ri-shape-2-line text-primary"></i> CSS Box Shadow Generator</h1>
    </header>

    <main class="container">
        <div class="panel controls">
            <div class="control-group">
                <label><span>Horizontal Offset</span> <span id="valX">0px</span></label>
                <input type="range" id="shiftX" min="-50" max="50" value="0">
            </div>

            <div class="control-group">
                <label><span>Vertical Offset</span> <span id="valY">10px</span></label>
                <input type="range" id="shiftY" min="-50" max="50" value="10">
            </div>

            <div class="control-group">
                <label><span>Blur Radius</span> <span id="valBlur">25px</span></label>
                <input type="range" id="blur" min="0" max="100" value="25">
            </div>

            <div class="control-group">
                <label><span>Spread Radius</span> <span id="valSpread">-5px</span></label>
                <input type="range" id="spread" min="-50" max="50" value="-5">
            </div>

            <div class="control-group">
                <label>Shadow Color</label>
                <input type="color" id="shadowColor" value="#000000">
            </div>

            <div class="control-group">
                <label><span>Shadow Opacity</span> <span id="valOpac">0.1</span></label>
                <input type="range" id="opacity" min="0" max="1" step="0.01" value="0.1">
            </div>

            <label class="toggle-row">
                <input type="checkbox" id="inset">
                Inset (Inner Shadow)
            </label>
        </div>

        <div class="preview-area">
            <div class="canvas">
                <div class="box" id="box">Preview Box</div>
            </div>
            <div class="code-container">
                <div class="code-box" id="cssCode">box-shadow: 0px 10px 25px -5px rgba(0,0,0,0.1);</div>
                <button class="btn" onclick="copyCode()"><i class="ri-clipboard-line"></i> Copy</button>
            </div>
        </div>
    </main>

    <script>
        const els = {
            sx: document.getElementById('shiftX'),
            sy: document.getElementById('shiftY'),
            bl: document.getElementById('blur'),
            sp: document.getElementById('spread'),
            color: document.getElementById('shadowColor'),
            op: document.getElementById('opacity'),
            inset: document.getElementById('inset'),
            vx: document.getElementById('valX'),
            vy: document.getElementById('valY'),
            vbl: document.getElementById('valBlur'),
            vsp: document.getElementById('valSpread'),
            vop: document.getElementById('valOpac'),
            box: document.getElementById('box'),
            code: document.getElementById('cssCode')
        };

        function hexToRgba(hex, alpha) {
            let r = 0, g = 0, b = 0;
            if (hex.length == 7) {
                r = parseInt(hex.substring(1, 3), 16);
                g = parseInt(hex.substring(3, 5), 16);
                b = parseInt(hex.substring(5, 7), 16);
            }
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function update() {
            const x = els.sx.value;
            const y = els.sy.value;
            const b = els.bl.value;
            const s = els.sp.value;
            const cStr = hexToRgba(els.color.value, els.op.value);
            const inStr = els.inset.checked ? 'inset ' : '';

            // Update text labels
            els.vx.textContent = x + 'px';
            els.vy.textContent = y + 'px';
            els.vbl.textContent = b + 'px';
            els.vsp.textContent = s + 'px';
            els.vop.textContent = els.op.value;

            // Update visual and code
            const shadowVal = `${inStr}${x}px ${y}px ${b}px ${s}px ${cStr}`;
            els.box.style.boxShadow = shadowVal;
            els.code.textContent = `box-shadow: ${shadowVal};`;
        }

        ['sx', 'sy', 'bl', 'sp', 'color', 'op', 'inset'].forEach(k => {
            els[k].addEventListener('input', update);
        });

        async function copyCode() {
            try {
                await navigator.clipboard.writeText(els.code.textContent);
                alert('Copied CSS');
            } catch (e) { }
        }

        update();
    </script>
</body>

</html>
