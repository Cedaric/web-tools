<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - Web Tools</title>
    <meta name="description" content="Generate high-quality QR codes from text or URLs instantly.">
    <meta name="tool-icon" content="ri-qr-code-line">
    <meta name="tool-tags" content="QR Code, Generator, Utility">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --surface-color: #ffffff;
            --border-color: #e2e8f0;
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --text-muted: #64748b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --text-color: #e2e8f0;
                --surface-color: #1e293b;
                --border-color: #334155;
                --primary-color: #6366f1;
                --primary-hover: #4f46e5;
                --text-muted: #94a3b8;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: var(--surface-color);
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header a {
            color: var(--text-muted);
            text-decoration: none;
        }

        .header a:hover {
            color: var(--text-color);
        }

        .container {
            flex: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        textarea {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--surface-color);
            color: var(--text-color);
            font-family: inherit;
            resize: vertical;
            min-height: 120px;
            outline: none;
            transition: border-color 0.2s;
        }

        textarea:focus {
            border-color: var(--primary-color);
        }

        .qr-preview-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
        }

        #qrContainer {
            background: #ffffff;
            /* always white for contrast */
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #qrContainer img {
            display: block;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s;
            width: 100%;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }
    </style>
</head>

<body>
    <header class="header">
        <a href="../index.html" title="Back to Tools"><i class="ri-arrow-left-line ri-xl"></i></a>
        <h1><i class="ri-qr-code-line text-primary"></i> QR Code Generator</h1>
    </header>

    <main class="container">
        <div class="panel">
            <div class="input-group">
                <label>Content (Text or URL)</label>
                <textarea id="qrText" placeholder="Enter URL or text here...">https://ceda.is/</textarea>
            </div>
            <button class="btn" onclick="generateQR()">Generate QR Code</button>
        </div>

        <div class="panel qr-preview-container">
            <div id="qrContainer"></div>
            <button class="btn" style="background: var(--text-color); color: var(--bg-color);" onclick="downloadQR()">
                <i class="ri-download-line"></i> Download PNG
            </button>
        </div>
    </main>

    <script>
        const qrContainer = document.getElementById('qrContainer');
        const qrText = document.getElementById('qrText');
        let qrcode = null;

        function generateQR() {
            const text = qrText.value.trim();
            if (!text) return;

            // Clear previous
            qrContainer.innerHTML = '';

            // Generate
            qrcode = new QRCode(qrContainer, {
                text: text,
                width: 256,
                height: 256,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function downloadQR() {
            const img = qrContainer.querySelector('img');
            if (!img || !img.src) return alert('Generate a QR code first');

            const a = document.createElement('a');
            a.href = img.src;
            a.download = 'qrcode.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        // Live typing
        qrText.addEventListener('input', () => {
            if (qrText.value.trim()) {
                generateQR();
            }
        });

        // Init
        generateQR();
    </script>
</body>

</html>
