<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter & Validator - Web Tools</title>
    <meta name="description" content="Free online tool to format, validate, and beautify JSON data.">
    <meta name="tool-icon" content="ri-brackets-line">
    <meta name="tool-tags" content="JSON, Formatter, Developer Tools">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --surface-color: #ffffff;
            --border-color: #e2e8f0;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --success-color: #10b981;
            --error-color: #ef4444;
            --text-muted: #64748b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --text-color: #e2e8f0;
                --surface-color: #1e293b;
                --border-color: #334155;
                --primary-color: #3b82f6;
                --primary-hover: #60a5fa;
                --text-muted: #94a3b8;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: var(--surface-color);
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }

        .header a:hover {
            color: var(--text-color);
        }

        .container {
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .toolbar {
            display: flex;
            gap: 1rem;
            background: var(--surface-color);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: background-color 0.2s;
            font-weight: 500;
        }

        .btn:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: var(--border-color);
        }

        .editor-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            min-height: 500px;
        }

        @media (max-width: 900px) {
            .editor-container {
                grid-template-columns: 1fr;
                min-height: auto;
            }

            textarea {
                min-height: 400px;
            }
        }

        .panel {
            background-color: var(--surface-color);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .panel-header {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            background-color: rgba(0, 0, 0, 0.02);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        textarea {
            flex: 1;
            width: 100%;
            padding: 1rem;
            border: none;
            resize: none;
            background: transparent;
            color: var(--text-color);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.9rem;
            outline: none;
            tab-size: 2;
        }

        .status {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: -0.5rem;
            display: none;
        }

        .status.success {
            display: flex;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status.error {
            display: flex;
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="header-left">
            <a href="../index.html" title="Back to Tools"><i class="ri-arrow-left-line ri-xl"></i></a>
            <h1><i class="ri-brackets-line text-primary"></i> JSON Formatter & Validator</h1>
        </div>
    </header>

    <main class="container">
        <div class="toolbar">
            <button class="btn" onclick="formatJSON()"><i class="ri-align-left"></i> Format / Beautify</button>
            <button class="btn btn-secondary" onclick="minifyJSON()"><i class="ri-contract-left-right-line"></i>
                Minify</button>
            <button class="btn btn-secondary" onclick="clearEditor()"><i class="ri-delete-bin-line"></i> Clear</button>
            <button class="btn btn-secondary" onclick="loadSample()"><i class="ri-file-code-line"></i> Load
                Sample</button>
            <div style="flex: 1;"></div>
            <select id="indentSize"
                style="padding: 0.5rem; border-radius: 6px; border: 1px solid var(--border-color); background: var(--surface-color); color: var(--text-color);">
                <option value="2">2 Spaces</option>
                <option value="4">4 Spaces</option>
                <option value="\t">Tab</option>
            </select>
        </div>

        <div id="statusMsg" class="status"></div>

        <div class="editor-container">
            <div class="panel">
                <div class="panel-header">
                    <span>Input JSON</span>
                </div>
                <textarea id="inputStr" placeholder="Paste your unformatted JSON here..."></textarea>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span>Output</span>
                    <button class="btn btn-secondary" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;"
                        onclick="copyOutput()"><i class="ri-clipboard-line"></i> Copy</button>
                </div>
                <textarea id="outputStr" readonly placeholder="Formatted output will appear here..."></textarea>
            </div>
        </div>
    </main>

    <script>
        const inputEl = document.getElementById('inputStr');
        const outputEl = document.getElementById('outputStr');
        const statusMsgEl = document.getElementById('statusMsg');
        const indentEl = document.getElementById('indentSize');

        function showStatus(message, isError) {
            statusMsgEl.innerHTML = isError
                ? `<i class="ri-error-warning-line"></i> ${message}`
                : `<i class="ri-checkbox-circle-line"></i> ${message}`;
            statusMsgEl.className = `status ${isError ? 'error' : 'success'}`;
        }

        function hideStatus() {
            statusMsgEl.className = 'status';
            statusMsgEl.style.display = 'none';
        }

        function formatJSON() {
            const raw = inputEl.value.trim();
            if (!raw) {
                hideStatus();
                outputEl.value = '';
                return;
            }

            try {
                const parsed = JSON.parse(raw);
                let space = indentEl.value;
                if (space === '2') space = 2;
                if (space === '4') space = 4;

                outputEl.value = JSON.stringify(parsed, null, space);
                showStatus('Valid JSON', false);
            } catch (e) {
                showStatus(`Invalid JSON: ${e.message}`, true);
            }
        }

        function minifyJSON() {
            const raw = inputEl.value.trim();
            if (!raw) return;

            try {
                const parsed = JSON.parse(raw);
                outputEl.value = JSON.stringify(parsed);
                showStatus('Valid JSON minified', false);
            } catch (e) {
                showStatus(`Invalid JSON: ${e.message}`, true);
            }
        }

        function clearEditor() {
            inputEl.value = '';
            outputEl.value = '';
            hideStatus();
            inputEl.focus();
        }

        function loadSample() {
            const sample = {
                "project": "Web Tools",
                "version": "1.0",
                "features": [
                    "JSON Formatter",
                    "Base64 Codec",
                    "URL Encoder"
                ],
                "active": true,
                "metadata": {
                    "author": "Cedar",
                    "created_at": "2025-01-01T00:00:00Z"
                }
            };
            inputEl.value = JSON.stringify(sample);
            formatJSON();
        }

        async function copyOutput() {
            if (!outputEl.value) return;
            try {
                await navigator.clipboard.writeText(outputEl.value);
                const btn = event.currentTarget;
                const orig = btn.innerHTML;
                btn.innerHTML = '<i class="ri-check-line"></i> Copied';
                setTimeout(() => btn.innerHTML = orig, 2000);
            } catch (err) {
                alert("Failed to copy text");
            }
        }

        // Auto-format on input, with simple debounce
        let timeout = null;
        inputEl.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(formatJSON, 800);
        });

        indentEl.addEventListener('change', () => {
            if (inputEl.value) formatJSON();
        });
    </script>
</body>

</html>
