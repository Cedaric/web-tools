<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Decoder - Web Tools</title>
    <meta name="description" content="Decode JSON Web Tokens (JWT) easily on the client-side.">
    <meta name="tool-icon" content="ri-key-2-line">
    <meta name="tool-tags" content="JWT, Security, Token, Decoder">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --surface-color: #ffffff;
            --border-color: #e2e8f0;
            --primary-color: #d946ef;
            --primary-hover: #c026d3;
            --text-muted: #64748b;
            --jwt-header: #ef4444;
            --jwt-payload: #d946ef;
            --jwt-sign: #0ea5e9;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --text-color: #e2e8f0;
                --surface-color: #1e293b;
                --border-color: #334155;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: var(--surface-color);
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header a {
            color: var(--text-muted);
            text-decoration: none;
        }

        .header a:hover {
            color: var(--text-color);
        }

        .container {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--surface-color);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .panel-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.02);
            font-weight: 600;
        }

        textarea {
            width: 100%;
            flex: 1;
            min-height: 400px;
            padding: 1.5rem;
            border: none;
            resize: none;
            background: transparent;
            color: var(--text-color);
            font-family: ui-monospace, monospace;
            font-size: 0.95rem;
            outline: none;
            word-break: break-all;
        }

        .decoded-container {
            flex: 1;
            padding: 1.5rem;
            background: transparent;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .part-header {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 0.5rem;
        }

        .color-header {
            color: var(--jwt-header);
            border-bottom-color: var(--jwt-header);
        }

        .color-payload {
            color: var(--jwt-payload);
            border-bottom-color: var(--jwt-payload);
        }

        pre {
            font-family: ui-monospace, monospace;
            font-size: 0.9rem;
            color: var(--text-color);
            background: rgba(0, 0, 0, 0.03);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
        }
    </style>
</head>

<body>
    <header class="header">
        <a href="../index.html" title="Back to Tools"><i class="ri-arrow-left-line ri-xl"></i></a>
        <h1><i class="ri-key-2-line text-primary"></i> JWT Decoder</h1>
    </header>

    <main class="container">
        <div class="panel">
            <div class="panel-header">Encoded Note (Paste JWT here)</div>
            <textarea id="jwtInput" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."></textarea>
        </div>

        <div class="panel">
            <div class="panel-header">Decoded Details</div>
            <div class="decoded-container">
                <div>
                    <div class="part-header color-header">Header: Algorithm & Token Type</div>
                    <pre id="outHeader">{}</pre>
                </div>
                <div>
                    <div class="part-header color-payload">Payload: Data</div>
                    <pre id="outPayload">{}</pre>
                </div>
                <div id="errorMsg" style="color: red; font-weight: 500; display: none;"></div>
            </div>
        </div>
    </main>

    <script>
        const input = document.getElementById('jwtInput');
        const outHeader = document.getElementById('outHeader');
        const outPayload = document.getElementById('outPayload');
        const errorMsg = document.getElementById('errorMsg');

        function parseJwt(token) {
            try {
                const parts = token.split('.');
                if (parts.length !== 3) throw new Error("Invalid JWT format (requires 3 parts)");

                // Base64Url decode helper
                const decode = (str) => {
                    const b64 = str.replace(/-/g, '+').replace(/_/g, '/');
                    const raw = atob(b64);
                    // Handle UTF-8 safely
                    return decodeURIComponent(raw.split('').map(function (c) {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    }).join(''));
                };

                const header = JSON.parse(decode(parts[0]));
                const payload = JSON.parse(decode(parts[1]));

                outHeader.textContent = JSON.stringify(header, null, 2);
                outPayload.textContent = JSON.stringify(payload, null, 2);
                errorMsg.style.display = 'none';

                // Colorize input
                input.style.color = 'var(--text-color)';
            } catch (e) {
                outHeader.textContent = "{}";
                outPayload.textContent = "{}";
                errorMsg.textContent = "Error: " + e.message;
                errorMsg.style.display = 'block';
            }
        }

        input.addEventListener('input', () => {
            const val = input.value.trim();
            if (val) parseJwt(val);
            else {
                outHeader.textContent = "{}";
                outPayload.textContent = "{}";
                errorMsg.style.display = 'none';
            }
        });
    </script>
</body>

</html>
