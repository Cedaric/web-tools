<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word & Character Counter - Web Tools</title>
    <meta name="description"
        content="Online text counter for words, characters, sentences, paragraphs, and reading time.">
    <meta name="tool-icon" content="ri-text-spacing">
    <meta name="tool-tags" content="Text, Counter, Writing, SEO">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --text-color: #1e293b;
            --surface-color: #ffffff;
            --border-color: #e2e8f0;
            --primary-color: #0ea5e9;
            --primary-hover: #0284c7;
            --text-muted: #64748b;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0f172a;
                --text-color: #e2e8f0;
                --surface-color: #1e293b;
                --border-color: #334155;
                --primary-color: #0ea5e9;
                --primary-hover: #38bdf8;
                --text-muted: #94a3b8;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background-color: var(--surface-color);
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header a {
            color: var(--text-muted);
            text-decoration: none;
        }

        .header a:hover {
            color: var(--text-color);
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .container {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .editor-panel {
            background: var(--surface-color);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .toolbar {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.02);
        }

        .btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background: var(--border-color);
        }

        textarea {
            flex: 1;
            min-height: 500px;
            width: 100%;
            padding: 1.5rem;
            border: none;
            resize: none;
            background: transparent;
            color: var(--text-color);
            font-size: 1.1rem;
            line-height: 1.8;
            outline: none;
        }

        .stats-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .stat-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .stat-card.primary {
            background: var(--primary-color);
            color: white;
            border: none;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .primary .stat-label {
            color: rgba(255, 255, 255, 0.8);
        }

        .metrics-list {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .metric-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        .metric-item:last-child {
            border-bottom: none;
        }

        .metric-value {
            font-weight: 600;
        }
    </style>
</head>

<body>
    <header class="header">
        <a href="../index.html" title="Back to Tools"><i class="ri-arrow-left-line ri-xl"></i></a>
        <h1><i class="ri-text-spacing text-primary"></i> Text Counter</h1>
    </header>

    <main class="container">
        <div class="editor-panel">
            <div class="toolbar">
                <span style="font-weight: 600; color: var(--text-muted); display:flex; align-items: center;">Type or
                    paste your text</span>
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn"
                        onclick="document.getElementById('textInput').value=''; updateStats(); document.getElementById('textInput').focus();"><i
                            class="ri-delete-bin-line"></i> Clear</button>
                    <button class="btn" onclick="copyText()"><i class="ri-clipboard-line"></i> Copy</button>
                </div>
            </div>
            <textarea id="textInput" placeholder="Start typing here..."></textarea>
        </div>

        <div class="stats-panel">
            <div class="stat-card primary">
                <div class="stat-value" id="valWords">0</div>
                <div class="stat-label">Words</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="valChars">0</div>
                <div class="stat-label">Characters</div>
            </div>

            <div class="metrics-list">
                <div class="metric-item">
                    <span>Characters (no spaces)</span>
                    <span class="metric-value" id="valCharsNoSpace">0</span>
                </div>
                <div class="metric-item">
                    <span>Sentences</span>
                    <span class="metric-value" id="valSentences">0</span>
                </div>
                <div class="metric-item">
                    <span>Paragraphs</span>
                    <span class="metric-value" id="valParagraphs">0</span>
                </div>
                <div class="metric-item">
                    <span>Reading Time</span>
                    <span class="metric-value" id="valReadTime">0 min</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        const input = document.getElementById('textInput');

        function updateStats() {
            const text = input.value;

            // Chars
            const chars = text.length;
            document.getElementById('valChars').textContent = chars;

            // Chars no space
            const charsNoSpace = text.replace(/\s/g, '').length;
            document.getElementById('valCharsNoSpace').textContent = charsNoSpace;

            // Words
            const wordsMatch = text.match(/\b[-?(\w+)?]+\b/gi);
            // Backup generic word match for CJK characters + english
            const cjkWords = text.match(/[\u00ff-\uffff]|\S+/g);
            const words = cjkWords ? cjkWords.length : 0;
            document.getElementById('valWords').textContent = words;

            // Sentences
            const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0).length;
            document.getElementById('valSentences').textContent = sentences;

            // Paragraphs
            const paragraphs = text.split(/\n+/).filter(p => p.trim().length > 0).length;
            document.getElementById('valParagraphs').textContent = paragraphs;

            // Read time (approx 200 words per minute)
            const minutes = Math.ceil(words / 200);
            document.getElementById('valReadTime').textContent = minutes > 0 ? `< ${minutes} min` : '0 min';
        }

        input.addEventListener('input', updateStats);

        async function copyText() {
            if (!input.value) return;
            try {
                await navigator.clipboard.writeText(input.value);
                alert("Text copied");
            } catch (e) { }
        }

        // Init
        updateStats();
    </script>
</body>

</html>
