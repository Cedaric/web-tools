<!DOCTYPE html>
<html lang="zh-CN" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MD App Generator</title>
    
    <!-- Remix Icon -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>

    <!-- Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#4f46e5', hover: '#4338ca' },
                        dark: { bg: '#09090b', surface: '#18181b', border: '#27272a' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Menlo', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        
        /* 滚动条美化 */
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 3px; }
        .dark .custom-scroll::-webkit-scrollbar-thumb { background-color: #3f3f46; }
        
        /* 编辑器背景 */
        .code-editor {
            background-image: linear-gradient(#f1f5f9 1px, transparent 1px), linear-gradient(90deg, #f1f5f9 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .dark .code-editor {
            background-image: linear-gradient(#27272a 1px, transparent 1px), linear-gradient(90deg, #27272a 1px, transparent 1px);
        }

        /* --- 修复核心：Tab 切换逻辑 --- */
        /* 使用 !important 确保覆盖 Tailwind 的默认样式 */
        .tab-content { display: none !important; }
        .tab-content.active { display: flex !important; }
        
        /* Tab 按钮状态 */
        .tab-btn.active { 
            color: #4f46e5; 
            border-bottom-color: #4f46e5; 
            background-color: rgba(79, 70, 229, 0.05);
        }
        .dark .tab-btn.active {
            color: #818cf8;
            border-bottom-color: #818cf8;
            background-color: rgba(129, 140, 248, 0.1);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 dark:bg-dark-bg dark:text-gray-200 transition-colors duration-200 flex flex-col min-h-screen lg:h-screen lg:overflow-hidden font-sans">

    <!-- Header -->
    <header class="flex-none h-14 bg-white dark:bg-dark-surface border-b border-gray-200 dark:border-dark-border flex items-center justify-between px-4 z-30">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-primary to-indigo-600 flex items-center justify-center text-white shadow-md">
                <i class="ri-html5-line text-lg"></i>
            </div>
            <h1 class="font-bold text-sm sm:text-base tracking-tight">MD App Generator</h1>
        </div>
        
        <div class="flex items-center gap-2">
            <button onclick="toggleTheme()" class="w-9 h-9 flex items-center justify-center rounded-lg text-gray-500 hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-zinc-800 transition-all">
                <i id="theme-icon" class="ri-moon-line text-lg"></i>
            </button>
        </div>
    </header>

    <!-- Main Layout -->
    <main class="flex-1 flex flex-col lg:grid lg:grid-cols-12 overflow-hidden">
        
        <!-- Left Panel: Controls -->
        <div class="lg:col-span-5 xl:col-span-4 flex flex-col border-b lg:border-b-0 lg:border-r border-gray-200 dark:border-dark-border bg-white dark:bg-dark-surface z-20 lg:h-full overflow-hidden">
            
            <!-- File Upload -->
            <div class="flex-none p-4 border-b border-gray-200 dark:border-dark-border">
                <div class="relative group w-full h-20 rounded-xl border-2 border-dashed border-gray-300 dark:border-zinc-700 bg-gray-50 dark:bg-zinc-900/50 hover:border-primary hover:bg-indigo-50/50 dark:hover:border-primary dark:hover:bg-indigo-900/20 transition-all cursor-pointer flex items-center justify-center gap-3">
                    <input type="file" id="file-input" accept=".md,.markdown" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                    <i class="ri-file-upload-line text-xl text-gray-400 group-hover:text-primary transition-colors"></i>
                    <div class="flex flex-col items-start">
                        <span id="file-name" class="text-sm font-medium text-gray-600 dark:text-gray-300 group-hover:text-primary truncate max-w-[200px]">上传 Markdown</span>
                        <span class="text-xs text-gray-400">支持 .md 文件</span>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="flex-none flex border-b border-gray-200 dark:border-dark-border bg-gray-50/50 dark:bg-zinc-900/30">
                <button onclick="switchTab('css')" id="tab-btn-css" class="tab-btn active flex-1 py-3 text-xs font-bold uppercase tracking-wider text-gray-500 border-b-2 border-transparent transition-all flex items-center justify-center gap-2">
                    <i class="ri-css3-line"></i> CSS 样式
                </button>
                <button onclick="switchTab('js')" id="tab-btn-js" class="tab-btn flex-1 py-3 text-xs font-bold uppercase tracking-wider text-gray-500 border-b-2 border-transparent transition-all flex items-center justify-center gap-2">
                    <i class="ri-javascript-line"></i> 交互 JS
                </button>
            </div>

            <!-- Editors -->
            <div class="flex-1 relative min-h-[300px] lg:min-h-0">
                <!-- CSS Editor Container (移除了 HTML 中的 flex 类，防止冲突) -->
                <div id="tab-css" class="tab-content active w-full h-full flex-col relative group">
                    <button onclick="clearCode('css')" class="absolute top-2 right-2 z-10 p-1.5 rounded text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 opacity-0 group-hover:opacity-100 transition-opacity" title="清空"><i class="ri-delete-bin-line"></i></button>
                    <textarea id="css-input" class="w-full h-full p-4 bg-transparent border-none resize-none focus:ring-0 font-mono text-sm leading-relaxed text-gray-600 dark:text-gray-300 code-editor outline-none custom-scroll" spellcheck="false" placeholder="/* 编写样式... */&#10;.markdown-body h1 { color: #4f46e5; }"></textarea>
                </div>

                <!-- JS Editor Container (移除了 HTML 中的 flex 类，防止冲突) -->
                <div id="tab-js" class="tab-content w-full h-full flex-col relative group">
                    <button onclick="clearCode('js')" class="absolute top-2 right-2 z-10 p-1.5 rounded text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 opacity-0 group-hover:opacity-100 transition-opacity" title="清空"><i class="ri-delete-bin-line"></i></button>
                    <textarea id="js-input" class="w-full h-full p-4 bg-transparent border-none resize-none focus:ring-0 font-mono text-sm leading-relaxed text-gray-600 dark:text-gray-300 code-editor outline-none custom-scroll" spellcheck="false" placeholder="// 编写脚本...&#10;const root = document.querySelector('.markdown-body');"></textarea>
                </div>
            </div>
        </div>

        <!-- Right Panel: Preview -->
        <div class="lg:col-span-7 xl:col-span-8 bg-gray-50 dark:bg-dark-bg flex flex-col h-auto lg:h-full overflow-hidden relative">
            
            <!-- Toolbar -->
            <div class="flex-none px-4 py-2 border-b border-gray-200 dark:border-dark-border bg-white/80 dark:bg-dark-surface/80 backdrop-blur flex justify-between items-center sticky top-0 z-10">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-wider flex items-center gap-2">
                    <i class="ri-eye-line"></i> 实时预览
                </span>
                <button onclick="copyFullHtml()" id="copy-btn" class="group flex items-center gap-2 px-4 py-1.5 bg-primary hover:bg-indigo-700 text-white rounded-full text-xs font-medium shadow-sm transition-all active:scale-95">
                    <i class="ri-file-code-line"></i>
                    <span id="copy-text">复制完整 HTML</span>
                </button>
            </div>

            <!-- Content Area -->
            <div class="flex-1 overflow-y-auto custom-scroll p-4 sm:p-8 lg:p-12 scroll-smooth" id="preview-scroll">
                <div id="render-target" class="markdown-body prose prose-slate dark:prose-invert max-w-3xl mx-auto break-words pb-20">
                    <!-- Empty State -->
                    <div class="flex flex-col items-center justify-center py-24 text-gray-300 dark:text-zinc-700 select-none">
                        <i class="ri-code-box-line text-5xl mb-4 opacity-50"></i>
                        <p class="text-sm">内容将在此处渲染</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Invisible Style Injector -->
    <style id="dynamic-style"></style>

    <script>
        // --- State Management ---
        const state = {
            md: "",
            css: "",
            js: ""
        };

        const els = {
            fileInput: document.getElementById('file-input'),
            fileName: document.getElementById('file-name'),
            cssInput: document.getElementById('css-input'),
            jsInput: document.getElementById('js-input'),
            renderTarget: document.getElementById('render-target'),
            styleTag: document.getElementById('dynamic-style'),
            copyBtn: document.getElementById('copy-btn'),
            copyText: document.getElementById('copy-text')
        };

        // --- Core: Pipeline ---
        function runPipeline() {
            if (!state.md) return;

            // 1. Render Markdown
            els.renderTarget.innerHTML = marked.parse(state.md);

            // 2. Inject JS (Re-run)
            const oldScript = document.getElementById('dynamic-script');
            if (oldScript) oldScript.remove();

            if (state.js) {
                try {
                    const script = document.createElement('script');
                    script.id = 'dynamic-script';
                    // Wrapping in IIFE safely and Hex escaping <script> isn't needed here for innerHTML injection via createElement
                    // but we do it properly
                    script.textContent = "(function(){ try { " + state.js + " } catch(e){ console.error(e) } })();";
                    document.body.appendChild(script);
                } catch (e) {
                    console.error("JS Inject Error", e);
                }
            }
        }

        // --- Event Listeners ---
        
        // CSS Input
        els.cssInput.addEventListener('input', (e) => {
            state.css = e.target.value;
            els.styleTag.textContent = state.css;
        });

        // JS Input
        els.jsInput.addEventListener('input', (e) => {
            state.js = e.target.value;
            runPipeline(); 
        });

        // File Input
        els.fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            els.fileName.textContent = file.name;
            els.fileName.classList.add('text-primary', 'font-bold');

            const reader = new FileReader();
            reader.onload = (e) => {
                state.md = e.target.result;
                runPipeline();
            };
            reader.readAsText(file);
        });

        // --- Features ---

        function switchTab(tab) {
            // Update Buttons
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-btn-' + tab).classList.add('active');
            
            // Update Content
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
        }

        function clearCode(type) {
            if (type === 'css') {
                state.css = "";
                els.cssInput.value = "";
                els.styleTag.textContent = "";
            } else {
                state.js = "";
                els.jsInput.value = "";
                runPipeline();
            }
        }

        function copyFullHtml() {
            if (!state.md && !state.css && !state.js) {
                alert("没有内容可导出");
                return;
            }

            // 【关键修复】使用 \x3C (Hex Escape) 代替 '<' 符号
            // 这确保了源代码中绝对不会出现连续的 script 标签
            const parts = [];
            parts.push('\x3C!DOCTYPE html\x3E');
            parts.push('\x3Chtml lang="zh-CN"\x3E');
            parts.push('\x3Chead\x3E');
            parts.push('    \x3Cmeta charset="UTF-8"\x3E');
            parts.push('    \x3Cmeta name="viewport" content="width=device-width, initial-scale=1.0"\x3E');
            parts.push('    \x3Ctitle\x3EExported Document\x3C/title\x3E');
            
            // Tailwind CDN - Hex Escaped
            parts.push('    \x3Cscript src="https://cdn.tailwindcss.com?plugins=typography"\x3E\x3C/script\x3E');
            
            // Tailwind Config
            parts.push('    \x3Cscript\x3E');
            parts.push('        tailwind.config = {');
            parts.push('            darkMode: "media",');
            parts.push('            theme: { extend: { colors: { primary: "#4f46e5" }, fontFamily: { sans: ["Inter", "system-ui", "sans-serif"] } } }');
            parts.push('        }');
            parts.push('    \x3C/script\x3E');
            
            // Styles
            parts.push('    \x3Cstyle\x3E');
            parts.push('        body { margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }');
            parts.push('        ::-webkit-scrollbar { width: 6px; height: 6px; }');
            parts.push('        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }');
            parts.push('        @media (prefers-color-scheme: dark) { ::-webkit-scrollbar-thumb { background: #3f3f46; } }');
            parts.push(state.css);
            parts.push('    \x3C/style\x3E');
            parts.push('\x3C/head\x3E');
            
            // Body
            parts.push('\x3Cbody class="bg-white text-slate-900 dark:bg-[#09090b] dark:text-slate-200 min-h-screen transition-colors p-4 sm:p-8"\x3E');
            parts.push('    \x3Cmain class="markdown-body prose prose-slate dark:prose-invert max-w-3xl mx-auto"\x3E');
            parts.push(els.renderTarget.innerHTML);
            parts.push('    \x3C/main\x3E');
            
            // User JS
            parts.push('    \x3Cscript\x3E');
            parts.push('        (function() {');
            parts.push('            try {');
            parts.push(state.js);
            parts.push('            } catch (err) { console.error("Custom Script Error:", err); }');
            parts.push('        })();');
            parts.push('    \x3C/script\x3E');
            
            parts.push('\x3C/body\x3E');
            parts.push('\x3C/html\x3E');

            const fullHtml = parts.join('\n');

            navigator.clipboard.writeText(fullHtml).then(() => {
                const icon = els.copyBtn.querySelector('i');
                const originalIconClass = icon.className;
                const originalText = els.copyText.textContent;

                icon.className = 'ri-check-line';
                els.copyText.textContent = '代码已复制';
                els.copyBtn.classList.replace('bg-primary', 'bg-green-600');
                els.copyBtn.classList.replace('hover:bg-indigo-700', 'hover:bg-green-700');

                setTimeout(() => {
                    icon.className = originalIconClass;
                    els.copyText.textContent = originalText;
                    els.copyBtn.classList.replace('bg-green-600', 'bg-primary');
                    els.copyBtn.classList.replace('hover:bg-green-700', 'hover:bg-indigo-700');
                }, 2000);
            });
        }

        // --- Theme Init ---
        const html = document.documentElement;
        function toggleTheme() {
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
                document.getElementById('theme-icon').className = 'ri-moon-line text-lg';
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
                document.getElementById('theme-icon').className = 'ri-sun-line text-lg';
            }
        }
        
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            html.classList.add('dark');
            document.getElementById('theme-icon').className = 'ri-sun-line text-lg';
        }
    </script>
</body>
</html>
